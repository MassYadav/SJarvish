version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: aios-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  chromadb:
    # CHANGE THIS LINE FROM: image: chromadb/chroma:0.5.3
    image: chromadb/chroma:latest     # <--- To this
    container_name: aios-chromadb
    ports:
      - "8000:8000"
    # ... rest of the file stays the same  


  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aios-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

volumes:
  redis_data:
  chromadb_data:
  prometheus_data: